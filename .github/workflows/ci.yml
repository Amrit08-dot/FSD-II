name: Experiment 16 Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing_FSDII/Exp16_FSDII_Backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          source venv/bin/activate
          pytest

  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing_FSDII/Exp16_FSDII_Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm run test -- --run
